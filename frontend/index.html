<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapMyMint | Visual Budgeting</title>
    <!-- Link to the D3.js library for data visualization and the stylesheet for styling the page -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <!-- Link to the stylesheet for styling the page -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <div class="brand">MapMyMint</div>
    <div class="nav-links">
        <a href="index.html" class="active">View Map</a>
        <a href="buget.html">Budget List</a>
        
    </div>
   
</nav>

<header class="TitleSection">
  <!-- Header section with a title and a button to import CSV files -->
    <h1>Map Your <span class="teal-text">Spending</span></h1>
    <div class="controls">
      <!--  <button class="btn-teal">Import CSV</button>  (Commented out and replaced for CSV File Implmentation) -->
<input type="file" id="csvFile" accept=".csv" style="display:none;">
<button class="btn-teal" onclick="handleCSV()">Import CSV</button>
<button class="btn-teal" onclick="downloadUpdatedCSV()">Download New CSV</button>

    </div>
</header>
<!-- Section to display the sunburst chart and a tooltip for additional information -->
<main class="main-dashboard">
    <section class="chart-column">
        <div id="sunburst"></div>
        <div id="tooltip" class="tooltip"></div>
    </section>


    <!-- Aside section for quick transaction entry -->
    <aside class="entry-column">
        <div class="card">
          <!-- Quick Add Form -->
            <h3>Quick Add</h3>
            <form id="transaction-form">
                <div class="input-group">
                    <label>Amount</label>
                    <input type="number" id="amount" placeholder="0.00" step="0.01">
                </div>
                <!-- Dropdown for selecting the category of the transaction -->
                <div class="input-group">
                    <label>Category</label>
                    <select id="category">
                        <option value="Housing">Housing</option>
                        <option value="Lifestyle">Lifestyle</option>
                        <option value="Savings">Savings</option>
                    </select>
                </div>
                <!-- Input field for adding a description of the transaction -->
                <div class="input-group">
                    <label>Description</label>
                    <input type="text" id="description" placeholder="e.g. Groceries">
                </div>
                <button type="button" class="btn-teal" id="add-btn">Add to Map</button>
            </form>
        </div>
    </aside>
</main>

<script src="chart.js"></script>
    
    <! Handles CSV upload, updates the data, and lets the user download a new CSV file -->
    
<script>
let csvData = "";
let fileName = "updated";

function handleCSV() {
    const input = document.getElementById("csvFile");
    input.click();

    input.onchange = function () {
        const file = input.files[0];
        if (!file) return;

        originalFileName = file.name.replace(/\.csv$/i, "");

        const reader = new FileReader();

        reader.onload = function (e) {
            let rows = e.target.result
                .trim()
                .split("\n")
                .map(r => r.split(","));

            rows = rows.map((row, i) => {
                if (i === 0) {
                    row.push("Status");
                } else {
                    row.push("Updated");
                }
                return row;
            });

            savedCSV = rows.map(r => r.join(",")).join("\n");
            alert("CSV loaded and updated. Click 'Download New CSV'.");
        };

        reader.readAsText(file);
    };
}

function downloadUpdatedCSV() {
    if (!savedCSV) {
        alert("Import a CSV first.");
        return;
    }

    const blob = new Blob([savedCSV], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = originalFileName + "_MapByMint.csv";
    a.click();

    URL.revokeObjectURL(url);
}
</script>

</body>
</html>
