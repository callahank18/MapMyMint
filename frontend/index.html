<body>

<nav>
    <div class="brand">MapMyMint</div>
    <div class="nav-links">
        <a href="index.html" class="active">View Map</a>
        <a href="buget.html">Budget List</a>

<main class="container">
<header class="TitleSection">
  <!-- Header section with a title and a button to import CSV files -->
    <h1>Map Your <span class="teal-text">Spending</span></h1>
    <div class="controls">
      <!--  <button class="btn-teal">Import CSV</button>  (Commented out and replaced for CSV File Implmentation) -->
<input type="file" id="csvFile" accept=".csv" style="display:none;">
<button class="btn-teal" onclick="handleCSV()">Import CSV</button>
<button class="btn-teal" onclick="downloadUpdatedCSV()">Download New CSV</button>

    </div>
</header>
<!-- Section to display the sunburst chart and a tooltip for additional information -->
<section class="main-dashboard">
    <section class="chart-column">
        <div id="sunburst"></div>
        <div id="tooltip" class="tooltip"></div>
    </section>


    <!-- Aside section for quick transaction entry -->
    <aside class="entry-column">
        <div class="card">
          <!-- Quick Add Form -->
            <h3>Quick Add</h3>
            <form id="transaction-form">
                <div class="input-group">
                    <label>Amount</label>
                    <input type="number" id="amount" placeholder="0.00" step="0.01">
                </div>
                <!-- Dropdown for selecting the category of the transaction -->
                <div class="input-group">
                    <label>Category</label>
                    <select id="category">
                        <option value="Housing">Housing</option>
                        <option value="Lifestyle">Lifestyle</option>
                        <option value="Savings">Savings</option>
                    </select>
                </div>
                <!-- Input field for adding a description of the transaction -->
                <div class="input-group">
                    <label>Description</label>
                    <input type="text" id="description" placeholder="e.g. Groceries">
                </div>
                <button type="button" class="btn-teal" id="add-btn">Add to Map</button>
            </form>
        </div>
    </aside>
</section>
</main>

<script src="chart.js"></script>
    
    <! Handles CSV upload, updates the data, and lets the user download a new CSV file -->
    
<script>
let csvData = "";
let fileName = "updated";

function handleCSV() {
    const input = document.getElementById("csvFile");
    input.click();

    input.onchange = function () {
        const file = input.files[0];
        if (!file) return;

        originalFileName = file.name.replace(/\.csv$/i, "");

        const reader = new FileReader();

        reader.onload = function (e) {
            let rows = e.target.result
                .trim()
                .split("\n")
                .map(r => r.split(","));

            rows = rows.map((row, i) => {
                if (i === 0) {
                    row.push("Status");
                } else {
                    row.push("Updated");
                }
                return row;
            });

            savedCSV = rows.map(r => r.join(",")).join("\n");
            alert("CSV loaded and updated. Click 'Download New CSV'.");
        };

        reader.readAsText(file);
    };
}

function downloadUpdatedCSV() {
    if (!savedCSV) {
        alert("Import a CSV first.");
        return;
    }

    const blob = new Blob([savedCSV], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = originalFileName + "_MapByMint.csv";
    a.click();

    URL.revokeObjectURL(url);
}

document.getElementById("add-btn").addEventListener("click", async () => {
    // 1. Grab values from the HTML form
    const amountVal = document.getElementById("amount").value;
    const categoryVal = document.getElementById("category").value;
    const descriptionVal = document.getElementById("description").value;

    // Validation Check
    if (!amountVal || !descriptionVal) {
        alert("Hold up! We need an amount and a description before sending to the Vault.");
        return;
    }

    // 2. Prep the payload for Pydantic
    const payload = {
        user_id: 1, // Placeholder until login logic is added
        goal_name: `${categoryVal}: ${descriptionVal}`,
        target_amount: parseFloat(amountVal),
        current_amount: 0
    };

    // 3. The API Call
    try {
        const response = await fetch("http://127.0.0.1:8000/goals/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            const data = await response.json();
            alert(`Success! Goal ID ${data.goal_id} is now in the database.`);
            
            // Clean up the form for the next entry
            document.getElementById("transaction-form").reset();
            
            // Refresh the chart with the new data
            refreshChart();
        } else {
            const errorData = await response.json();
            alert("The Server didn't like that: " + JSON.stringify(errorData.detail));
        }
    } catch (error) {
        console.error("Connection Error:", error);
        alert("Could not reach the FastAPI server. Is it running on port 8000?");
    }
});
</script>


</body>
</html>
